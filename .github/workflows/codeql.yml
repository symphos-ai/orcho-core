name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "20 2 * * 2"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze Python
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # docs-only PRs don't need a CodeQL database build + analysis. `code`
      # is true iff at least one changed file is NOT a .md/.mdx. On
      # `schedule` (no diff to compare) paths-filter has no base to work
      # from and evaluates every filter to true, so the weekly full scan is
      # unaffected. The job still runs and reports "Analyze Python" quickly
      # either way, so this required check never hangs pending.
      - name: Detect docs-only change
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!**/*.mdx'

      - name: Initialize CodeQL
        if: steps.filter.outputs.code == 'true'
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: python

      - name: Perform CodeQL analysis
        if: steps.filter.outputs.code == 'true'
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
