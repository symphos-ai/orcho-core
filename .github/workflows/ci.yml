name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # docs-only PRs (e.g. a single .md/.mdx change) don't need a Python
      # install + lint + full pytest run. `code` is true iff at least one
      # changed file is NOT a .md/.mdx. The job still runs and reports its
      # required "test" status quickly either way — only the trigger stays
      # unconditional, so branch protection's required check never hangs
      # pending.
      - name: Detect docs-only change
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!**/*.mdx'

      - name: Set up Python
        if: steps.filter.outputs.code == 'true'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and dev dependencies
        if: steps.filter.outputs.code == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        if: steps.filter.outputs.code == 'true'
        run: ruff check .

      - name: Test with coverage
        if: steps.filter.outputs.code == 'true'
        run: |
          pytest -q \
            --cov=agents \
            --cov=cli \
            --cov=core \
            --cov=pipeline \
            --cov=sdk \
            --cov=shell \
            --cov=tools \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        if: steps.filter.outputs.code == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

      - name: Upload coverage to Codecov
        if: steps.filter.outputs.code == 'true'
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: coverage.xml
          fail_ci_if_error: false
          use_oidc: true

  # macOS is the primary development platform but was previously untested in
  # CI. This job runs the full suite there so the "cross-platform" claim has
  # coverage behind it. It is a separate job (not a matrix on `test`) so the
  # required "test" status check keeps its exact name for branch protection.
  macos:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect docs-only change
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!**/*.mdx'

      - name: Set up Python
        if: steps.filter.outputs.code == 'true'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and dev dependencies
        if: steps.filter.outputs.code == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        if: steps.filter.outputs.code == 'true'
        run: ruff check .

      - name: Test
        if: steps.filter.outputs.code == 'true'
        run: pytest -q

  # Native Windows smoke. CPython ships no `pty` module, so the engine uses a
  # thread-drained pipe transport there (agents/stream_transport.py). This job
  # is the proof behind the native-Windows support claim: importing the engine,
  # the CLI, the streaming transport tests, and an end-to-end `orcho run --mock`
  # must all pass on windows-latest. It is intentionally scoped — the full
  # POSIX suite (process groups, signals, pty) is not Windows-clean and runs on
  # the Linux/macOS jobs above.
  windows-smoke:
    runs-on: windows-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect docs-only change
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            code:
              - '**'
              - '!**/*.md'
              - '!**/*.mdx'

      - name: Set up Python
        if: steps.filter.outputs.code == 'true'
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and dev dependencies
        if: steps.filter.outputs.code == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        if: steps.filter.outputs.code == 'true'
        run: ruff check .

      - name: Import engine + CLI (the hard blocker)
        if: steps.filter.outputs.code == 'true'
        run: |
          python -c "import agents; import cli.orcho; print('import agents + cli OK')"
          python -m cli.orcho --help > /dev/null

      - name: Streaming transport tests
        if: steps.filter.outputs.code == 'true'
        run: |
          python -m pytest -q \
            tests/unit/agents/test_stream_transport.py \
            tests/unit/agents/test_stream.py

      - name: End-to-end orcho run --mock
        if: steps.filter.outputs.code == 'true'
        run: |
          set -euo pipefail
          proj="$RUNNER_TEMP/proj"
          ws="$RUNNER_TEMP/ws"
          mkdir -p "$proj" "$ws"
          git -C "$proj" init -q -b main
          printf 'print("hi")\n' > "$proj/app.py"
          git -C "$proj" add -A
          git -C "$proj" -c user.email=ci@example.com -c user.name=ci commit -q -m init
          python -m cli.orcho run --mock \
            --task "Add a hello world function" \
            --project "$proj" \
            --workspace "$ws" \
            --profile small_task
